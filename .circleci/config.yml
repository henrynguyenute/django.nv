jobs:
  build:
    docker:
      - image: cimg/base:stable                   # similar to "image" in GitLab
    steps:
      - checkout
      - run: echo "This is a build step"          # similar to "script" in GitLab

  test:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run: echo "This is a test step"

  integration:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          command: |
            echo "This is an integration step"
            exit 1
  artifact:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Create artifact file
          command: echo "hello" > hello.txt
      - store_artifacts:
          path: hello.txt
          destination: hello.txt

  prod:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run: echo "This is a deploy step"

workflows:
  version: 2
  django:
    jobs:
      - build:
          filters:
            branches:
              only: main
      - test:
          requires:
            - build
      - integration:
          requires:
            - test
      - artifact:
          requires:
            - integration
      - prod:
          requires:
            - artifact
          type: approval
